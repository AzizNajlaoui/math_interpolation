<!doctype html>
<html>
  <head>
    <title>Newton Interpolation Dashboard</title>
    <style>
      body {
        background: #111;
        color: #eee;
        font-family: sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        color: #3498db;
      }
      .container {
        max-width: 900px;
        width: 100%;
        background: #1a1a1a;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      section {
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 1px solid #333;
      }
      .canvas-group {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 15px;
      }
      canvas {
        border: 2px solid #3498db;
        background: #000;
        border-radius: 8px;
      }
      .label {
        font-weight: bold;
        color: #3498db;
        margin-bottom: 8px;
        text-transform: uppercase;
        font-size: 0.9rem;
      }
      .debug {
        margin-top: 15px;
        font-family: monospace;
        color: #2ecc71;
        background: #000;
        padding: 10px;
        border-radius: 4px;
      }
      b {
        color: #2ecc71;
      }
    </style>
  </head>
  <body>
    <h1>Newton Polynomial Interpolation</h1>

    <div class="container">
      <section>
        <h3>1. Spatial Curve Mapping</h3>
        <p>The car follows the calculated polynomial path $P(t)$.</p>
        <canvas id="spatialCanvas" width="800" height="300"></canvas>
        <div class="debug" id="spatialDebug"></div>
      </section>

      <section>
        <h3>2. Real-Time Logic vs. Interpolation</h3>
        <p>
          The Red car updates every <b>33.3ms (30 Ticks)</b>. The Green car
          updates every <b>Refresh Frame</b>.
        </p>
        <div class="canvas-group">
          <div>
            <div class="label">30Hz Raw Data (Stutter)</div>
            <canvas id="cvs30" width="400" height="200"></canvas>
          </div>
          <div>
            <div class="label">Interpolated (Smooth)</div>
            <canvas id="cvs60" width="400" height="200"></canvas>
          </div>
        </div>
      </section>
    </div>

    <script>
      // The SVG path data extracted from your SVG
      const carPathData =
        "M16,6l3,4h2c1.11,0,2,0.89,2,2v3h-2c0,1.66-1.34,3-3,3s-3-1.34-3-3H9c0,1.66-1.34,3-3,3s-3-1.34-3-3H1v-3c0-1.11,0.89-2,2-2l3-4H16 M10.5,7.5H6.75L4.86,10h5.64V7.5 M12,7.5V10h5.14l-1.89-2.5H12 M6,13.5c-0.83,0-1.5,0.67-1.5,1.5s0.67,1.5,1.5,1.5s1.5-0.67,1.5-1.5S6.83,13.5,6,13.5 M18,13.5c-0.83,0-1.5,0.67-1.5,1.5s0.67,1.5,1.5,1.5s1.5-0.67,1.5-1.5S18.83,13.5,18,13.5z";
      const carPath = new Path2D(carPathData);

      class Newton {
        static getValues(points) {
          let n = points.length;
          let y = points.map((p) => p.y);
          for (let i = 1; i < n; i++) {
            for (let j = n - 1; j >= i; j--) {
              y[j] = (y[j] - y[j - 1]) / (points[j].x - points[j - i].x);
            }
          }
          return y;
        }
        static compute(t, points, coef) {
          let res = coef[0];
          let p = 1;
          for (let i = 1; i < coef.length; i++) {
            p *= t - points[i - 1].x;
            res += coef[i] * p;
          }
          return res;
        }
      }

      function drawCar(ctx, x, y, color, scale = 2) {
        ctx.save();
        // Translate to position and center the SVG (original is 24x24)
        ctx.translate(x - 12 * scale, y - 12 * scale);
        ctx.scale(scale, scale);
        ctx.fillStyle = color;
        ctx.fill(carPath);
        ctx.restore();
      }

      // --- INITIALIZE TOP GRAPH ---
      const sCvs = document.getElementById("spatialCanvas");
      const sCtx = sCvs.getContext("2d");
      const sPath = [
        { x: 0, y: 250 },
        { x: 1, y: 50 },
        { x: 2, y: 150 },
        { x: 4, y: 20 },
      ];
      const sCoefs = Newton.getValues(sPath);
      let sT = 0,
        sDir = 0.015;

      // --- INITIALIZE BOTTOM COMPARISON ---
      const ctx30 = document.getElementById("cvs30").getContext("2d");
      const ctx60 = document.getElementById("cvs60").getContext("2d");
      const fPath = [
        { x: 0, y: 50 },
        { x: 1, y: 80 },
        { x: 2, y: 320 },
        { x: 3, y: 350 },
      ];
      const fCoefs = Newton.getValues(fPath);
      let fT = 0,
        fDir = 0.02,
        lastTickTime = 0,
        stutterPos = 0;
      const tickRate = 1000 / 30;

      function mainLoop(currentTime) {
        // 1. TOP SPATIAL CANVAS
        sCtx.clearRect(0, 0, sCvs.width, sCvs.height);
        sCtx.strokeStyle = "#333";
        sCtx.beginPath();
        for (let xV = 0; xV <= 4; xV += 0.05) {
          sCtx.lineTo(xV * 200, Newton.compute(xV, sPath, sCoefs));
        }
        sCtx.stroke();

        let curY = Newton.compute(sT, sPath, sCoefs);
        drawCar(sCtx, sT * 200, curY, "#2ecc71", 2.5);

        document.getElementById("spatialDebug").innerText =
          `Car X: ${(sT * 200).toFixed(0)} | Car Y: ${curY.toFixed(0)}`;
        sT += sDir;
        if (sT >= 4 || sT <= 0) sDir *= -1;

        // 2. BOTTOM COMPARISON
        if (currentTime - lastTickTime >= tickRate) {
          stutterPos = Newton.compute(fT, fPath, fCoefs);
          lastTickTime = currentTime;
        }
        let interpolatedPos = Newton.compute(fT, fPath, fCoefs);

        ctx30.clearRect(0, 0, 400, 200);
        ctx60.clearRect(0, 0, 400, 200);

        drawCar(ctx30, stutterPos, 100, "#e74c3c", 3);
        drawCar(ctx60, interpolatedPos, 100, "#2ecc71", 3);

        fT += fDir;
        if (fT >= 3 || fT <= 0) fDir *= -1;

        requestAnimationFrame(mainLoop);
      }
      requestAnimationFrame(mainLoop);
    </script>
  </body>
</html>
